<script>
        // Micro-interactions for the poster view
        document.querySelector('.poster-canvas').addEventListener('mousemove', (e) => {
            const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
            const x = (e.clientX - left) / width - 0.5;
            const y = (e.clientY - top) / height - 0.5;
            
            e.currentTarget.style.transform = `perspective(1000px) rotateY(${x * 4}deg) rotateX(${-y * 4}deg)`;
        });

        document.querySelector('.poster-canvas').addEventListener('mouseleave', (e) => {
            e.currentTarget.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
        });
    </script>
