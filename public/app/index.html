  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page { width: 100%; max-width: 420px; text-align: center; }

    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.6rem, 7vw, 2rem);
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .wordmark .dot { color: var(--gold); }

    .headline {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.9rem, 8.5vw, 2.5rem);
      line-height: 1.12;
      margin-top: 22px;
      color: var(--cream);
    }

    .blurb {
      margin-top: 16px;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--cream-dim);
    }

    /* The single action. Everything above exists to get the reader here, so nothing
       else on this page is allowed to look like a button. */
    .badge-wrap { margin-top: 30px; }
    .appstore-badge {
      display: block;
      width: 100%;
      max-width: 240px;
      margin: 0 auto;
      transition: transform 0.15s ease;
    }
    .appstore-badge:hover { transform: translateY(-2px); }
    .appstore-badge svg { display: block; width: 100%; height: auto; }
    .appstore-badge:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
      border-radius: 10px;
    }

    .freeline {
      margin-top: 14px;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Deliberately quiet: a non-iPhone visitor should not hit a dead end, but this
       must never compete with the badge above it. */
    .fallback {
      margin-top: 34px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: rgba(179, 171, 146, 0.75);
    }
    .fallback a { color: var(--cream-dim); text-decoration: underline; text-underline-offset: 3px; }
    .fallback a:hover { color: var(--cream); }
    .fallback a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  </style>

<body>
  <main class="page">
    <div class="wordmark">The ARCHV<span class="dot">.</span></div>

    <p class="blurb">A daily archive of the game in original illustration. No ads, no account, no betting, and one quiet notification a day.</p>

    <div class="badge-wrap">
      <a class="appstore-badge" id="app-store-badge" href="https://apps.apple.com/app/id6786508653">

      </a>
      <p class="freeline">Free on iPhone</p>
    </div>

    <p class="fallback">Not on an iPhone? The archive reads on the web at <a id="web-fallback" href="https://thearchv.ca/">thearchv.ca</a>.</p>
  </main>
  <script>
    (function () {
      function bind(el, target) {
        if (!el) return;
        el.addEventListener('click', function () {
          if (window.posthog) posthog.capture('app_cta_click', { target: target, href: el.href });
        });
      }
      bind(document.getElementById('app-store-badge'), 'appstore');
      bind(document.getElementById('web-fallback'), 'web_fallback');
    })();
  </script>
