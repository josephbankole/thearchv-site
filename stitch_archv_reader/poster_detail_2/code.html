<body class="font-body-md selection:bg-gold-accent selection:text-background min-h-screen flex flex-col">

<!-- Header Navigation -->

<!-- Main Content: Centered Poster with Negative Space -->
<main class="flex-1 flex flex-col items-center justify-center pt-24 pb-40 px-margin-mobile">
<div class="relative w-full max-w-[340px] md:max-w-[420px] transition-all duration-1000 ease-out">

<img alt="Mexico 1970 Archival Print" class="w-full h-full object-cover" src="../assets/posters/mexico-1970.webp"/>
<div class="absolute inset-4 border border-gold-accent/5 pointer-events-none"></div>
</div>
<!-- Floating Action Icons (Relative to Poster) -->

<button class="material-symbols-outlined text-gold-accent/60 hover:text-gold-accent transition-colors">bookmark</button>
<button class="material-symbols-outlined text-gold-accent/60 hover:text-gold-accent transition-colors">share</button>
</div>
</div>
<!-- Serif Caption with Maximum Negative Space -->
<div class="mt-12 text-center space-y-4 max-w-sm">
<h1 class="font-headline-md text-parchment-text opacity-90 italic">
                1970 · MEXICO · <span class="not-italic">the moment</span>
</h1>
<p class="font-body-md text-parchment-text/60 leading-relaxed max-w-xs mx-auto">
                The birth of Total Football and Pelé's final masterpiece under the Mexican sun.
            </p>

<script>
        // Micro-interaction for the poster depth
        const poster = document.querySelector('.poster-canvas');
        document.addEventListener('mousemove', (e) => {
            if (!poster) return;
            const { left, top, width, height } = poster.getBoundingClientRect();
            const x = (e.clientX - left) / width - 0.5;
            const y = (e.clientY - top) / height - 0.5;
            
            poster.style.transform = `perspective(1200px) rotateY(${x * 2}deg) rotateX(${-y * 2}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            if (poster) poster.style.transform = `perspective(1200px) rotateY(0deg) rotateX(0deg)`;
        });
    </script>
