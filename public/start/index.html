  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* No fixed heights anywhere (2026-07-22): body{height:100%} plus flex centring
       clipped the top of content taller than the viewport above the scroll origin
       (the laptop cut-off). min-height:100svh below lets the body grow with the hub;
       html carries the base colour so overscroll never flashes the UA canvas. */
    html { background: var(--navy-deep); }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .hub { width: 100%; max-width: 440px; text-align: center; }

    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 9vw, 2.75rem);
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .wordmark .dot { color: var(--gold); }

    .tagline {
      margin-top: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--cream-dim);
    }

    .actions { margin-top: 28px; display: flex; flex-direction: column; gap: 16px; }

    .today-card {
      display: block;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(201, 161, 74, 0.4);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }
    .today-card img { display: block; width: 100%; aspect-ratio: 4 / 5; object-fit: cover; }
    .kicker {
      color: var(--gold);
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.26em;
      text-align: left; margin-bottom: -6px;
    }
    .today-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    .cta-gold {
      display: block;
      padding: 17px 22px;
      border-radius: 12px;
      background: var(--gold);
      color: var(--navy-deep);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .cta-gold:hover { transform: translateY(-2px); filter: brightness(1.06); }
    .cta-gold:focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

    .linkrow {
      display: flex; justify-content: center; gap: 8px;
      font-size: 0.92rem; letter-spacing: 0.03em;
    }
    .linkrow .quiet { color: var(--cream-dim); text-decoration: none; padding: 8px 6px; }
    .linkrow .quiet:hover { color: var(--cream); }
    .linkrow .sep { color: rgba(179, 171, 146, 0.5); padding: 8px 0; }
    .linkrow .quiet:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .strip { margin-top: 26px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .strip a { display: block; border-radius: 10px; overflow: hidden; border: 1px solid rgba(242, 234, 211, 0.16); }
    .strip img { display: block; width: 100%; aspect-ratio: 3 / 4; object-fit: cover; }
    .strip a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Substack subscribe, embedded. Cross-origin iframe, so we cannot restyle its
       inside; we only frame it to sit tidily in the column. Substack serves it with
       frame-ancestors *, which is what makes this possible at all. */
    .dispatch-embed { margin-top: 26px; }
    .embed-label {
      font-size: 0.78rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 10px;
    }
    .dispatch-embed iframe {
      display: block;
      width: 100%;
      border: 1px solid rgba(242, 234, 211, 0.18);
      border-radius: 12px;
      background: #ffffff;
    }

    /* Follow is the primary ask now: the app is iOS only and converts almost no one,
       so the button that anyone can act on leads. Gold, above the story. */
    .follow-cta { text-align: center; }

    /* Story headline and dek, populated from the feed. The infogram bakes the same text
       into the picture, so the script hides these once it loads (see below); they are the
       state a visitor sees if the infogram never arrives. */
    .today-copy { padding: 15px 17px 17px; text-align: left; }
    .today-headline {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 1.3rem;
      line-height: 1.2;
      color: var(--cream);
    }
    .today-dek {
      margin-top: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--cream-dim);
    }

    /* App Store, demoted from a badge to a quiet secondary line (kept, not removed). */
    .alsoiphone {
      display: inline-block;
      color: var(--cream-dim);
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      text-decoration: none;
      padding: 6px 8px;
    }
    .alsoiphone:hover { color: var(--cream); }
    .alsoiphone:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 6px; }

    /* One slim line: the other sports live on the homepage, where the tab bar is. */
    .multisport {
      margin-top: 22px;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      color: var(--cream-dim);
    }
    .multisport a { color: var(--cream); text-decoration: underline; text-underline-offset: 3px; }
    .multisport a:hover { color: var(--gold); }
    .multisport a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  </style>
</head>
<body>
  <main class="hub">
    <h1 class="wordmark">The ARCHV<span class="dot">.</span></h1>
    <p class="tagline">Every final since 1970, drawn.</p>

    <div class="actions">
      <!-- Referrer-aware Follow, filled in by the script from document.referrer. iOS-only
           app + ~0% install means the ask anyone can act on has to lead. -->
      <a class="cta-gold follow-cta" id="follow-cta" href="https://www.instagram.com/thearchvfc" target="_blank" rel="noopener noreferrer">Follow @thearchvfc</a>

      <p class="kicker">TODAY</p>
      <a class="today-card" id="today-card" href="https://thearchv.ca/">
        <img id="today-img" src="/posters/lusail-2022.webp" alt="Lusail 2022 World Cup final poster, illustrated by The ARCHV." />
        <div class="today-copy">
          <h2 class="today-headline" id="today-headline">Today’s verified story.</h2>
          <p class="today-dek" id="today-dek">The day’s football, drawn and reported plainly.</p>
        </div>
      </a>
      <a class="cta-gold" id="today-cta" href="https://thearchv.ca/">Read today’s story</a>

      <div class="dispatch-embed">
        <p class="embed-label">The day’s story by email, free.</p>
        <iframe src="https://thearchvdispatch.substack.com/embed"
                title="Subscribe to The ARCHV Dispatch"
                height="320" frameborder="0" scrolling="no" loading="lazy"></iframe>
      </div>

      <a class="alsoiphone" id="app-store-link" href="https://apps.apple.com/app/id6786508653">Also on iPhone</a>

      <nav class="linkrow" aria-label="More from The ARCHV">
        <a class="quiet" href="https://thearchv.ca/">Archive</a><span class="sep">·</span><a class="quiet" href="https://thearchvdispatch.substack.com" target="_blank" rel="noopener noreferrer">Dispatch</a><span class="sep">·</span><a class="quiet" href="https://www.etsy.com/shop/TheARCHVCA" target="_blank" rel="noopener noreferrer">Store</a>
      </nav>

      <div class="strip" aria-label="From the poster archive">
        <a href="https://thearchv.ca/#archive"><img src="/posters/mexico-1970.webp" alt="México 1970 final poster, illustrated." loading="lazy" /></a>
        <a href="https://thearchv.ca/#archive"><img src="/posters/azteca-1986.webp" alt="Azteca 1986 final poster, illustrated." loading="lazy" /></a>
        <a href="https://thearchv.ca/#archive"><img src="/posters/paris-1998.webp" alt="Paris 1998 final poster, illustrated." loading="lazy" /></a>
      </div>

      <p class="multisport">Now covering <a href="https://thearchv.ca/">NFL, Formula 1, Tennis and Golf</a>.</p>
    </div>
  </main>
  <script>
    (function () {
      function track(name, props) { if (window.posthog) posthog.capture(name, props); }
      function bindCta(el, target) { if (el) el.addEventListener('click', function () { track('start_cta_click', { target: target, href: el.href }); }); }

      // Referrer-aware Follow. Almost every visitor arrives from one social app, so send
      // them back to that same profile: the follow is then one tap in an app they already
      // have open. Unknown or direct traffic defaults to Instagram, the main channel.
      var ref = document.referrer || '';
      var follow = { platform: 'instagram', url: 'https://www.instagram.com/thearchvfc', label: 'Follow @thearchvfc' };
      if (/tiktok\./i.test(ref)) follow = { platform: 'tiktok', url: 'https://www.tiktok.com/@thearchvfc', label: 'Follow on TikTok' };
      else if (/instagram\./i.test(ref)) follow = { platform: 'instagram', url: 'https://www.instagram.com/thearchvfc', label: 'Follow on Instagram' };
      else if (/facebook\.|fb\.watch/i.test(ref)) follow = { platform: 'facebook', url: 'https://www.facebook.com/thearchvfc', label: 'Follow on Facebook' };
      var followBtn = document.getElementById('follow-cta');
      if (followBtn) {
        followBtn.href = follow.url;
        followBtn.textContent = follow.label;
        followBtn.addEventListener('click', function () { track('follow_click', { platform: follow.platform }); });
      }

      bindCta(document.getElementById('app-store-link'), 'appstore');
      bindCta(document.getElementById('today-card'), 'today_card');
      bindCta(document.getElementById('today-cta'), 'today_cta');
      document.querySelectorAll('.linkrow .quiet').forEach(function (a) {
        bindCta(a, a.href.indexOf('substack') > -1 ? 'dispatch' : a.href.indexOf('etsy') > -1 ? 'store' : 'archive');
      });

      // Today's lead, from the same feed the iOS app reads. Point the card and the gold
      // button at the actual article (not the homepage, which converts almost no one), and
      // write the headline and dek in. If the infogram loads it bakes that text into the
      // picture, so hide the text versions then; if it never arrives, they stay as the copy.
      fetch('/feed/today.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).then(function (d) {
        var lead = d && d.lead;
        if (!lead || !lead.url) return;
        var card = document.getElementById('today-card');
        var cta = document.getElementById('today-cta');
        var img = document.getElementById('today-img');
        var h = document.getElementById('today-headline');
        var dek = document.getElementById('today-dek');
        card.href = lead.url;
        cta.href = lead.url;
        if (lead.headline && h) h.textContent = lead.headline;
        if (lead.dek && dek) dek.textContent = lead.dek;
        if (img && lead.infogram) {
          var probe = new Image();
          probe.onload = function () {
            img.src = lead.infogram;
            img.alt = lead.infogramAlt || lead.headline || img.alt;
            if (h) h.style.display = 'none';
            if (dek) dek.style.display = 'none';
          };
          probe.src = lead.infogram;
        }
      }).catch(function () {});
    })();
  </script>
</body>
</html>
