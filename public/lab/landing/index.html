/* ===== Reset + brand tokens ===== */
:root {
  --navy: #0C2A3E;
  --navy-deep: #071a26;
  --cream: #F2EAD3;
  --gold: #C9A14A;
  --cream-faint: rgba(242, 234, 211, .38);
  --cream-dim: rgba(242, 234, 211, .16);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: var(--navy-deep);
  color: var(--cream);
  overflow-x: hidden;
}
body {
  font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }
h1, h2, .fx { font-family: "Fraunces", Georgia, serif; }

/* ===== ACT 1: The Crest Assembles ===== */
#act1 {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 42%, #0f3149 0%, var(--navy) 45%, var(--navy-deep) 100%);
  cursor: pointer;
  transition: opacity .6s ease;
}
#act1.is-hidden { display: none; }
#act1.is-leaving { opacity: 0; pointer-events: none; }

.a1-stage {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.1rem;
  transform: scale(1);
  transition: transform 1.1s cubic-bezier(.22,.61,.36,1), gap 1.1s ease;
}
.a1-stage.is-settled {
  transform: scale(.42) translateY(-38vh);
}
.a1-glow {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 640px;
  height: 640px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,161,74,.30) 0%, rgba(201,161,74,.09) 38%, rgba(201,161,74,0) 68%);
  opacity: 0;
  transition: opacity 1.4s ease;
  pointer-events: none;
}
.a1-glow.is-on { opacity: 1; }

.a1-crest {
  width: min(46vw, 260px);
  height: auto;
  position: relative;
  display: block;
  /* Film-exposure reveal: masked to a point, near-black, slightly oversized. */
  clip-path: circle(0% at 50% 50%);
  filter: brightness(.05) contrast(1.35);
  transform: scale(1.06);
  transition:
    clip-path 1.5s cubic-bezier(.4,.05,.2,1),
    filter 1.5s cubic-bezier(.4,.05,.2,1),
    transform 1.5s cubic-bezier(.22,.61,.36,1);
}
.a1-crest.is-revealed {
  clip-path: circle(52% at 50% 50%);
  filter: brightness(1) contrast(1);
  transform: scale(1);
}
.a1-crest.is-instant {
  transition: none;
  clip-path: circle(52% at 50% 50%);
  filter: none;
  transform: none;
}

.a1-wordmark {
  display: flex;
  gap: .14em;
  font-size: clamp(1.15rem, 4.4vw, 1.7rem);
  letter-spacing: .32em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--cream);
  padding-left: .32em; /* optical centring for the letter-spacing */
}
.a1-wordmark span {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .5s ease, transform .5s ease;
}
.a1-wordmark span.is-in { opacity: 1; transform: translateY(0); }

.a1-skip {
  position: absolute;
  bottom: 2.2rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: .74rem;
  letter-spacing: .08em;
  color: var(--cream-faint);
  opacity: 0;
  transition: opacity .6s ease 1.4s;
}
.a1-skip.is-in { opacity: 1; }

/* ===== ACT 2: The Reading Room ===== */
#act2 {
  position: relative;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--navy-deep);
  opacity: 0;
  transition: opacity .9s ease;
}
#act2.is-in { opacity: 1; }

/* Fixed, centre-weighted warm glow. Static by design: the room reads cinematic
   with no interaction required and content is always fully readable. */
.light-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(circle 46vmax at 50% 38%,
    rgba(201,161,74,.16) 0%,
    rgba(201,161,74,.07) 22%,
    rgba(12,42,62,0) 52%);
}
.light-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle 20vmax at 50% 38%,
    rgba(242,234,211,.10) 0%,
    rgba(242,234,211,0) 60%);
}

/* Drifting gold specks ("the snowing effect"): same gold and softness as the
   homepage mobile hero's dust, scaled up. Pure CSS animations, transform/opacity
   only, absolutely positioned behind the text (.room sits above at z-index 1). */
.specks {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.speck {
  position: absolute;
  top: -6px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  will-change: transform, opacity;
  animation: speckFall linear infinite;
}
@keyframes speckFall {
  0%   { transform: translate3d(0, 0, 0); opacity: 0; }
  10%  { opacity: .5; }
  45%  { transform: translate3d(1.6vw, 46vh, 0); }
  80%  { opacity: .28; }
  100% { transform: translate3d(-1.2vw, 104vh, 0); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .speck { animation: none; opacity: 0; }
}

.room {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 4.4rem 1.5rem 3.5rem;
}

.room__mast {
  text-align: center;
  margin-bottom: 3.2rem;
}
.room__crest {
  display: block;
  width: 56px;
  height: 56px;
  margin: 0 auto .6rem;
  opacity: .92;
}
.room__wordmark {
  font-size: .78rem;
  letter-spacing: .34em;
  text-transform: uppercase;
  color: var(--cream-faint);
  font-weight: 600;
}

.lead__kicker {
  font-size: .74rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  margin: 0 0 .7rem;
  opacity: .3;
  transition: opacity .5s ease;
}
.lead__headline {
  font-size: clamp(1.7rem, 6vw, 2.5rem);
  line-height: 1.14;
  font-weight: 600;
  color: var(--cream);
  margin: 0 0 .8rem;
  opacity: .28;
  transition: opacity .5s ease;
}
.lead__dek {
  font-size: 1.02rem;
  line-height: 1.5;
  color: var(--cream-faint);
  margin: 0 0 .9rem;
  opacity: .22;
  transition: opacity .5s ease;
}
.lead__prov {
  font-size: .72rem;
  letter-spacing: .05em;
  color: var(--cream-faint);
  opacity: .2;
  transition: opacity .5s ease;
}
.lead__prov::before {
  content: "";
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  margin-right: .5em;
  vertical-align: middle;
}

.lit { opacity: 1 !important; }

.more {
  margin-top: 2.6rem;
  padding-top: 2rem;
  border-top: 1px solid var(--cream-dim);
  list-style: none;
  padding-left: 0;
}
.more li {
  margin: 0 0 1.3rem;
  opacity: .16;
  transition: opacity .5s ease;
}
.more li:last-child { margin-bottom: 0; }
.more__headline {
  display: block;
  font-family: "Fraunces", Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.32;
  color: var(--cream);
  margin: 0 0 .25rem;
}
.more__kicker {
  font-size: .68rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--cream-faint);
}

.room__loading {
  color: var(--cream-faint);
  font-size: .9rem;
  opacity: .5;
}

.room__foot {
  margin-top: 3.4rem;
  padding-top: 1.6rem;
  border-top: 1px solid var(--cream-dim);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.enter-link {
  font-family: "Fraunces", Georgia, serif;
  font-size: 1rem;
  color: var(--gold);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,161,74,.4);
  padding-bottom: .1rem;
}
.enter-link:hover { border-color: var(--gold); }
.replay-link {
  font-size: .74rem;
  letter-spacing: .04em;
  color: var(--cream-faint);
  text-decoration: none;
  border-bottom: 1px solid transparent;
}
.replay-link:hover { border-color: var(--cream-faint); }

/* Reduced motion: content fully readable, no crest reveal animation, specks removed, glow stays */
@media (prefers-reduced-motion: reduce) {
  .a1-stage, .a1-glow, .a1-crest, .a1-wordmark span, #act2, .lead__kicker, .lead__headline, .lead__dek, .lead__prov, .more li {
    transition: none !important;
  }
}

@media (max-width: 380px) {
  .room { padding: 3.6rem 1.15rem 3rem; }
}
</style>
</head>
<body>

<div id="act1" role="button" aria-label="Skip intro">
  <div class="a1-stage" id="a1Stage">
    <div class="a1-glow" id="a1Glow"></div>
    <img class="a1-crest" id="a1Crest" src="/brand/crest-badge@512.png" alt="The ARCHV crest" decoding="async" />
    <div class="a1-wordmark" id="a1Wordmark" aria-hidden="true"></div>
  </div>
  <p class="a1-skip" id="a1Skip">Tap or scroll to skip</p>
</div>

<main id="act2">
  <div class="light-layer" id="lightLayer"></div>
  <div class="specks" id="specks" aria-hidden="true"></div>
  <div class="room">
    <div class="room__mast">
      <img class="room__crest" src="/brand/crest-badge@192.png" alt="" aria-hidden="true" decoding="async" />
      <p class="room__wordmark">The ARCHV</p>
    </div>

    <article id="leadArticle">
      <p class="room__loading" id="loadingMsg">The room is settling. One moment.</p>
    </article>

    <ul class="more" id="moreList" hidden></ul>

    <div class="room__foot">
      <a class="enter-link" href="https://thearchv.ca/">Enter the archive</a>
      <a class="replay-link" id="replayLink" href="#replay">Watch that again</a>
    </div>
  </div>
</main>

<script>
(function () {
  "use strict";

  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var FEED_URL = "https://thearchv.ca/feed/today.json";

  /* ---------- ACT 1 ---------- */
  var act1 = document.getElementById("act1");
  var act2 = document.getElementById("act2");
  var stage = document.getElementById("a1Stage");
  var glow = document.getElementById("a1Glow");
  var wordmarkEl = document.getElementById("a1Wordmark");
  var skipEl = document.getElementById("a1Skip");
  var replayLink = document.getElementById("replayLink");

  var SEEN_KEY = "archv_lab_landing_seen";
  var act1Done = false;
  var act1Timers = [];

  function clearAct1Timers() {
    act1Timers.forEach(function (t) { clearTimeout(t); });
    act1Timers = [];
  }

  function buildWordmark() {
    var word = "THE ARCHV";
    wordmarkEl.innerHTML = "";
    word.split("").forEach(function (ch) {
      var span = document.createElement("span");
      span.textContent = ch === " " ? "  " : ch;
      wordmarkEl.appendChild(span);
    });
  }
  buildWordmark();

  function revealWordmark() {
    var spans = wordmarkEl.querySelectorAll("span");
    spans.forEach(function (span, i) {
      var t = setTimeout(function () { span.classList.add("is-in"); }, i * 55);
      act1Timers.push(t);
    });
  }

  function finishAct1() {
    if (act1Done) return;
    act1Done = true;
    clearAct1Timers();
    try { sessionStorage.setItem(SEEN_KEY, "1"); } catch (e) {}
    act1.classList.add("is-leaving");
    var t = setTimeout(function () {
      act1.classList.add("is-hidden");
      act2.classList.add("is-in");
      startAct2();
    }, reduceMotion ? 0 : 620);
    act1Timers.push(t);
  }

  var crestImg = document.getElementById("a1Crest");

  function playAct1() {
    act1Done = false;
    act1.classList.remove("is-hidden", "is-leaving");
    act2.classList.remove("is-in");
    stage.classList.remove("is-settled");
    glow.classList.remove("is-on");
    skipEl.classList.remove("is-in");
    crestImg.classList.remove("is-revealed", "is-instant");
    buildWordmark();

    if (reduceMotion) {
      // Reduced motion: real crest appears settled immediately, straight to Act 2.
      crestImg.classList.add("is-instant");
      stage.classList.add("is-settled");
      glow.classList.add("is-on");
      revealWordmark();
      finishAct1();
      return;
    }

    // Film-exposure reveal of the real crest: the projector bloom warms up, then the
    // raster emerges via an expanding radial clip, brightness/contrast easing up from
    // near-black, and a subtle 1.06 -> 1.0 scale settle. All ~1.5s, CSS-transitioned.
    var t0 = setTimeout(function () { glow.classList.add("is-on"); }, 60);
    var t1 = setTimeout(function () {
      crestImg.classList.add("is-revealed");
    }, 120);
    var t2 = setTimeout(function () {
      stage.classList.add("is-settled");
    }, 1550);
    var t3 = setTimeout(function () {
      revealWordmark();
    }, 1850);
    var t4 = setTimeout(function () { skipEl.classList.add("is-in"); }, 400);
    var t5 = setTimeout(function () { finishAct1(); }, 2650);
    act1Timers.push(t0, t1, t2, t3, t4, t5);
  }

  act1.addEventListener("click", finishAct1);
  window.addEventListener("wheel", function () { if (!act1.classList.contains("is-hidden")) finishAct1(); }, { passive: true });
  window.addEventListener("touchmove", function () { if (!act1.classList.contains("is-hidden")) finishAct1(); }, { passive: true });
  window.addEventListener("keydown", function (e) {
    if (!act1.classList.contains("is-hidden") && (e.key === "Enter" || e.key === " " || e.key === "Escape")) finishAct1();
  });

  replayLink.addEventListener("click", function (e) {
    e.preventDefault();
    try { sessionStorage.removeItem(SEEN_KEY); } catch (err) {}
    window.scrollTo(0, 0);
    playAct1();
  });

  var seen = false;
  try { seen = sessionStorage.getItem(SEEN_KEY) === "1"; } catch (e) {}

  if (seen) {
    act1.classList.add("is-hidden");
    act2.classList.add("is-in");
    startAct2();
  } else {
    playAct1();
  }

  /* ---------- ACT 2 ---------- */
  var act2Started = false;
  var leadArticleEl = document.getElementById("leadArticle");
  var moreListEl = document.getElementById("moreList");

  var LANE_LABEL = {
    transfer: "Transfer Desk",
    worldcup: "International Football",
    "world-cup": "International Football",
    leagues: "Football Leagues"
  };

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
  }

  function provenanceLine(entry) {
    var bits = [];
    if (entry.status) bits.push(entry.status === "verified" ? "Verified" : esc(entry.status));
    if (entry.day) bits.push(esc(entry.day));
    return bits.join(" · ");
  }

  function renderFeed(data) {
    var lead = data && data.lead;
    if (!lead) throw new Error("no lead");
    var kicker = LANE_LABEL[lead.section] || "The Desk";
    leadArticleEl.innerHTML =
      '<p class="lead__kicker">' + esc(kicker) + '</p>' +
      '<h1 class="lead__headline">' + esc(lead.headline) + '</h1>' +
      '<p class="lead__dek">' + esc(lead.dek) + '</p>' +
      '<p class="lead__prov">' + provenanceLine(lead) + '</p>';

    var wrap = Array.isArray(data.wrap) ? data.wrap.slice(0, 3) : [];
    if (wrap.length) {
      moreListEl.innerHTML = wrap.map(function (entry) {
        var lane = LANE_LABEL[entry.section] || "The Desk";
        return '<li><span class="more__kicker">' + esc(lane) + (entry.day ? ' · ' + esc(entry.day) : '') + '</span>' +
          '<span class="more__headline">' + esc(entry.headline) + '</span></li>';
      }).join("");
      moreListEl.hidden = false;
    }

    requestAnimationFrame(function () {
      var els = [].slice.call(leadArticleEl.querySelectorAll(".lead__kicker, .lead__headline, .lead__dek, .lead__prov"));
      els.forEach(function (el, i) {
        setTimeout(function () { el.classList.add("lit"); }, reduceMotion ? 0 : i * 90);
      });
      var items = [].slice.call(moreListEl.querySelectorAll("li"));
      items.forEach(function (el, i) {
        setTimeout(function () { el.classList.add("lit"); }, reduceMotion ? 0 : 260 + i * 110);
      });
    });
  }

  function renderFeedError() {
    leadArticleEl.innerHTML =
      '<p class="lead__kicker lit">The ARCHV</p>' +
      '<h1 class="lead__headline lit">The desk is between editions.</h1>' +
      '<p class="lead__dek lit">Today’s lead could not be reached from here. The rest of the archive is one tap away.</p>';
  }

  function loadFeed() {
    var url = FEED_URL + (FEED_URL.indexOf("?") === -1 ? "?" : "&") + "v=" + Date.now();
    fetch(url, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("bad response"); return r.json(); })
      .then(renderFeed)
      .catch(renderFeedError);
  }

  /* Gold specks, "the snowing effect": DOM built once here, then pure CSS
     animations do all the motion (transform/opacity only, no per-frame JS).
     Sizes, positions and timings are varied per speck; reduced motion hides
     them entirely via the stylesheet. */
  var specksBuilt = false;
  function buildSpecks() {
    if (specksBuilt || reduceMotion) return;
    specksBuilt = true;
    var layer = document.getElementById("specks");
    var count = 15;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < count; i++) {
      var s = document.createElement("span");
      s.className = "speck";
      var size = 2 + Math.random() * 3; // 2-5px
      s.style.width = size.toFixed(1) + "px";
      s.style.height = size.toFixed(1) + "px";
      s.style.left = (Math.random() * 100).toFixed(1) + "%";
      s.style.animationDuration = (16 + Math.random() * 14).toFixed(1) + "s"; // very slow fall
      s.style.animationDelay = (-Math.random() * 30).toFixed(1) + "s"; // already mid-fall on load
      frag.appendChild(s);
    }
    layer.appendChild(frag);
  }

  function startAct2() {
    if (act2Started) return;
    act2Started = true;
    loadFeed();
    buildSpecks();
  }

  if (seen) { /* already called above */ }
})();
</script>
</body>
</html>
