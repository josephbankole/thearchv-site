  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
      --pitch: #2E6B3A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    .card { width: 100%; max-width: 480px; text-align: center; }
    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 1.4rem;
    }
    .wordmark a { color: inherit; text-decoration: none; }
    .wordmark .dot { color: var(--gold); }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      margin-top: 26px;
      line-height: 1.15;
    }
    .sub { margin-top: 12px; color: var(--cream-dim); }
    .progress { margin-top: 30px; font-size: 0.85rem; letter-spacing: 0.08em; color: var(--gold); text-transform: uppercase; }
    .question {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.25rem, 5vw, 1.55rem);
      margin-top: 12px;
      line-height: 1.3;
      min-height: 3em;
    }
    .options { margin-top: 22px; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      border: 1px solid rgba(242, 234, 211, 0.28);
      border-radius: 12px;
      background: rgba(7, 28, 43, 0.55);
      color: var(--cream);
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .btn:hover { border-color: var(--gold); }
    .btn.right { border-color: var(--pitch); background: rgba(46, 107, 58, 0.25); }
    .btn.wrong { border-color: #8a3b3b; background: rgba(138, 59, 59, 0.2); }
    .btn.gold {
      border-color: var(--gold);
      background: rgba(201, 161, 74, 0.14);
      color: var(--cream);
      text-decoration: none;
    }
    .verdict {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.6rem, 6.5vw, 2.1rem);
      margin-top: 26px;
      line-height: 1.2;
    }
    .score { margin-top: 10px; color: var(--gold); font-size: 1.1rem; }
    .verdict-line { margin-top: 14px; color: var(--cream-dim); }
    .cta-block { margin-top: 34px; display: flex; flex-direction: column; gap: 12px; }
    .small { margin-top: 26px; font-size: 0.85rem; color: var(--cream-dim); }
    .small a { color: var(--gold); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="wordmark"><a href="/">The ARCHV<span class="dot">.</span></a></div>

    <!-- Intro -->
    <section id="intro">
      <h1>What's your football IQ?</h1>
      <p class="sub">Eight questions from the archive. About sixty seconds. No sign-up,
      nothing collected, just the verdict.</p>
      <div class="options" style="margin-top:34px">
        <button class="btn gold" id="start">Start</button>
      </div>
    </section>

    <!-- Quiz -->
    <section id="quiz" class="hidden">
      <p class="progress" id="progress"></p>
      <p class="question" id="question"></p>
      <div class="options" id="options"></div>
    </section>

    <!-- Result -->
    <section id="result" class="hidden">
      <p class="verdict" id="verdict"></p>
      <p class="score" id="score"></p>
      <p class="verdict-line" id="verdict-line"></p>
      <div class="cta-block">
        <!-- APP_STORE_URL_PLACEHOLDER: Flip day, point this at the App Store download
             URL (https://apps.apple.com/app/idPLACEHOLDER, same convention as /start
             and the site masthead) and change the label to "Get the app". Until then
             it goes to the site. -->
        <a class="btn gold" id="cta-primary" href="https://thearchv.ca/start">Read the archive</a>
        <button class="btn" id="share">Share your score</button>
        <button class="btn" id="again">Go again</button>
      </div>
    </section>

    <p class="small">An independent football publication. Not affiliated with FIFA,
    any club, federation, competition, or player. <a href="/privacy">Privacy</a></p>
  </main>

  <script>
    const QUESTIONS = [
      { q: 'Who won the first World Cup, in 1930?',
        a: ['Uruguay', 'Brazil', 'Italy'], right: 0 },
      { q: 'The 1970 final at the Azteca. Brazil beat Italy by what score?',
        a: ['2-1', '4-1', '3-0'], right: 1 },
      { q: 'Which club has won the most European Cups?',
        a: ['AC Milan', 'Liverpool', 'Real Madrid'], right: 2 },
      { q: 'Johan Cruyff unveiled his turn at which World Cup?',
        a: ['1974', '1978', '1970'], right: 0 },
      { q: 'The Hand of God, 1986. Who were Argentina playing?',
        a: ['West Germany', 'England', 'Belgium'], right: 1 },
      { q: 'Istanbul, 2005. Liverpool were how far down at half time?',
        a: ['2-0', '3-1', '3-0'], right: 2 },
      { q: 'Which nation won back-to-back World Cups in 1934 and 1938?',
        a: ['Italy', 'Uruguay', 'Argentina'], right: 0 },
      { q: 'Who scored the winner in the 1974 final?',
        a: ['Johan Neeskens', 'Gerd Muller', 'Paul Breitner'], right: 1 },
    ];
    const VERDICTS = [
      { min: 7, name: 'Archive grade.', line: 'You could write for the desk. The reading room will feel like home.' },
      { min: 4, name: 'Season ticket.', line: 'Solid on the big nights, hazy between them. The archive fills the gaps.' },
      { min: 0, name: 'Casual, for now.', line: 'Everyone starts somewhere. One considered read a day fixes this.' },
    ];

    const $ = id => document.getElementById(id);
    let i = 0, score = 0, locked = false;

    function show(q) {
      $('progress').textContent = 'Question ' + (i + 1) + ' of ' + QUESTIONS.length;
      $('question').textContent = q.q;
      const box = $('options');
      box.innerHTML = '';
      q.a.forEach((label, idx) => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = label;
        b.addEventListener('click', () => pick(b, idx, q.right));
        box.appendChild(b);
      });
      locked = false;
    }

    function pick(btn, idx, right) {
      if (locked) return;
      locked = true;
      const buttons = $('options').children;
      buttons[right].classList.add('right');
      if (idx === right) { score++; } else { btn.classList.add('wrong'); }
      setTimeout(() => {
        i++;
        if (i < QUESTIONS.length) { show(QUESTIONS[i]); }
        else { finish(); }
      }, 650);
    }

    function finish() {
      $('quiz').classList.add('hidden');
      $('result').classList.remove('hidden');
      const v = VERDICTS.find(v => score >= v.min);
      $('verdict').textContent = v.name;
      $('score').textContent = score + ' out of ' + QUESTIONS.length;
      $('verdict-line').textContent = v.line;
      if (window.posthog) posthog.capture('quiz_complete', { score: score });
    }

    $('start').addEventListener('click', () => {
      $('intro').classList.add('hidden');
      $('quiz').classList.remove('hidden');
      if (window.posthog) posthog.capture('quiz_start');
      show(QUESTIONS[0]);
    });

    $('again').addEventListener('click', () => {
      i = 0; score = 0;
      $('result').classList.add('hidden');
      $('quiz').classList.remove('hidden');
      show(QUESTIONS[0]);
    });

    $('cta-primary').addEventListener('click', () => {
      if (window.posthog) posthog.capture('quiz_cta_tap', { score: score });
    });

    $('share').addEventListener('click', async () => {
      const text = 'I scored ' + score + '/' + QUESTIONS.length +
        ' on The ARCHV football IQ quiz. thearchv.ca/quiz';
      if (navigator.share) {
        try { await navigator.share({ text: text }); } catch (e) { /* cancelled */ }
      } else {
        try {
          await navigator.clipboard.writeText(text);
          $('share').textContent = 'Copied';
        } catch (e) { /* clipboard unavailable */ }
      }
    });
  </script>
</body>
</html>
