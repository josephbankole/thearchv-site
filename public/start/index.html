<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The ARCHV. Start here.</title>
  <meta name="description" content="Football's archive, told properly. Read the archive, subscribe to the Dispatch, or shop the store." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://thearchv.ca/start" />
  <link rel="icon" href="/favicon.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The ARCHV. Start here." />
  <meta property="og:description" content="Football's archive, told properly." />
  <meta property="og:url" content="https://thearchv.ca/start" />
  <meta property="og:image" content="https://thearchv.ca/og.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .hub { width: 100%; max-width: 440px; text-align: center; }

    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 9vw, 2.75rem);
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .wordmark .dot { color: var(--gold); }

    .tagline {
      margin-top: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--cream-dim);
    }

    .links {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .btn {
      display: block;
      padding: 17px 22px;
      border: 1px solid rgba(242, 234, 211, 0.28);
      border-radius: 12px;
      background: rgba(7, 28, 43, 0.55);
      color: var(--cream);
      text-decoration: none;
      font-size: 1.02rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
      background: var(--navy-deep);
    }
    .btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="hub">
    <div class="wordmark">The ARCHV<span class="dot">.</span></div>
    <p class="tagline">Football's archive, told properly.</p>

    <nav class="links">
      <a class="btn" href="https://thearchv.ca/">Read the archive</a>
      <a class="btn" href="https://thearchvdispatch.substack.com" target="_blank" rel="noopener noreferrer">The ARCHV Dispatch</a>
      <a class="btn" href="https://www.etsy.com/shop/TheARCHVCA" target="_blank" rel="noopener noreferrer">Shop the store</a>
    </nav>
  </main>
</body>
</html>
