<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The ARCHV Dispatch. Football, told properly, in your inbox.</title>
  <meta name="description" content="The ARCHV Dispatch: football history and the stories behind the game, sent to your inbox. No noise." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://thearchv.ca/dispatch" />
  <link rel="icon" href="/favicon.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The ARCHV Dispatch" />
  <meta property="og:description" content="Football history and the stories behind the game, in your inbox." />
  <meta property="og:url" content="https://thearchv.ca/dispatch" />
  <meta property="og:image" content="https://thearchv.ca/og.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 460px; text-align: center; }

    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.5rem;
      color: var(--cream);
      letter-spacing: 0.01em;
    }
    .wordmark .dot { color: var(--gold); }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 300;
      font-size: clamp(2rem, 8vw, 2.6rem);
      line-height: 1.05;
      margin-top: 26px;
      color: var(--cream);
    }
    .lede {
      margin-top: 16px;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--cream-dim);
    }

    .embed {
      margin-top: 30px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(242, 234, 211, 0.22);
      background: #fff;
    }
    .embed iframe { display: block; width: 100%; height: 150px; border: 0; }

    .fallback {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--cream-dim);
    }
    .fallback a { color: var(--gold); text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }

    .back { margin-top: 28px; }
    .back a { color: var(--cream-dim); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.02em; }
    .back a:hover { color: var(--cream); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="wordmark">The ARCHV<span class="dot">.</span></div>
    <h1>The Dispatch</h1>
    <p class="lede">Football history and the stories behind the game, told properly, in your inbox. No noise, no spam.</p>

    <div class="embed">
      <iframe src="https://thearchvdispatch.substack.com/embed" title="Subscribe to The ARCHV Dispatch" scrolling="no"></iframe>
    </div>
    <p class="fallback">Trouble with the form? <a href="https://thearchvdispatch.substack.com" target="_blank" rel="noopener noreferrer">Subscribe on Substack</a>.</p>

    <p class="back"><a href="https://thearchv.ca/">Back to the archive</a></p>
  </main>
</body>
</html>
