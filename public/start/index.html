  <style>
    :root {
      --navy: #0C2A3E;
      --navy-deep: #071C2B;
      --cream: #F2EAD3;
      --cream-dim: #B3AB92;
      --gold: #C9A14A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background:
        radial-gradient(120% 80% at 50% 0%, #0e3047 0%, var(--navy) 45%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .hub { width: 100%; max-width: 440px; text-align: center; }

    .wordmark {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 9vw, 2.75rem);
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .wordmark .dot { color: var(--gold); }

    .tagline {
      margin-top: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--cream-dim);
    }

    .actions { margin-top: 28px; display: flex; flex-direction: column; gap: 16px; }

    .today-card {
      display: block;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(201, 161, 74, 0.4);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }
    .today-card img { display: block; width: 100%; aspect-ratio: 4 / 5; object-fit: cover; }
    .kicker {
      color: var(--gold);
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.26em;
      text-align: left; margin-bottom: -6px;
    }
    .today-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    .cta-gold {
      display: block;
      padding: 17px 22px;
      border-radius: 12px;
      background: var(--gold);
      color: var(--navy-deep);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .cta-gold:hover { transform: translateY(-2px); filter: brightness(1.06); }
    .cta-gold:focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

    .linkrow {
      display: flex; justify-content: center; gap: 8px;
      font-size: 0.92rem; letter-spacing: 0.03em;
    }
    .linkrow .quiet { color: var(--cream-dim); text-decoration: none; padding: 8px 6px; }
    .linkrow .quiet:hover { color: var(--cream); }
    .linkrow .sep { color: rgba(179, 171, 146, 0.5); padding: 8px 0; }
    .linkrow .quiet:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .strip { margin-top: 26px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .strip a { display: block; border-radius: 10px; overflow: hidden; border: 1px solid rgba(242, 234, 211, 0.16); }
    .strip img { display: block; width: 100%; aspect-ratio: 3 / 4; object-fit: cover; }
    .strip a:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* App Store badge: Apple's standard "Download on the App Store" treatment,
       drawn inline (no external asset load, CSP-clean). Shipped hidden until
       flip day — see FLIP-DAY.md at the repo root. */
    .appstore-badge {
      display: block;
      width: 100%;
      max-width: 200px;
      margin: 0 auto;
    }
    .appstore-badge svg { display: block; width: 100%; height: auto; }
    .appstore-badge:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
      border-radius: 10px;
    }
  </style>

<body>
  <main class="hub">
    <div class="wordmark">The ARCHV<span class="dot">.</span></div>
    <p class="tagline">Every final since 1970, drawn.</p>

    <div class="actions">
      <a class="appstore-badge" id="app-store-badge" href="https://apps.apple.com/app/id6786508653">
        <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Download on the App Store">
          <rect x="0.5" y="0.5" width="199" height="59" rx="10" fill="#000000" stroke="#A6A6A6" stroke-width="1"/>
          <g fill="#FFFFFF">
            <!-- Apple mark -->
            <path d="M32.9 20.9c-.9 1.1-2.4 2-3.9 1.9-.2-1.5.5-3.1 1.4-4.1.9-1.1 2.5-1.9 3.8-2 .2 1.6-.5 3.1-1.3 4.2zm1.3 2.1c-2.2-.1-4 1.2-5.1 1.2-1.1 0-2.6-1.2-4.3-1.1-2.2 0-4.2 1.3-5.4 3.2-2.3 4-.6 9.9 1.6 13.2 1.1 1.6 2.4 3.4 4.1 3.3 1.6-.1 2.3-1 4.2-1s2.5 1 4.3 1c1.8 0 2.9-1.6 4-3.2 1.2-1.8 1.8-3.6 1.8-3.7-.1 0-3.4-1.3-3.4-5.1 0-3.2 2.6-4.7 2.7-4.8-1.5-2.2-3.8-2.4-4.5-2.5z"/>
            <!-- Wordmark: two-line "Download on the / App Store" -->
            <text x="47" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" letter-spacing="0.3">DOWNLOAD ON THE</text>
            <text x="46" y="42" font-family="Georgia,'Times New Roman',serif" font-size="18">App Store</text>
          </g>
        </svg>
      </a>
      <p class="kicker">TODAY</p>
      <a class="today-card" id="today-card" href="https://thearchv.ca/">
        <img id="today-img" src="/posters/lusail-2022.webp" alt="Lusail 2022 World Cup final poster, illustrated by The ARCHV." />
      </a>
      <a class="cta-gold" id="today-cta" href="https://thearchv.ca/">Read today’s story</a>
      <nav class="linkrow" aria-label="More from The ARCHV">
        <a class="quiet" href="https://thearchv.ca/">Archive</a><span class="sep">·</span><a class="quiet" href="https://thearchvdispatch.substack.com" target="_blank" rel="noopener noreferrer">Dispatch</a><span class="sep">·</span><a class="quiet" href="https://www.etsy.com/shop/TheARCHVCA" target="_blank" rel="noopener noreferrer">Store</a>
      </nav>
      <div class="strip" aria-label="From the poster archive">
        <a href="https://thearchv.ca/#archive"><img src="/posters/mexico-1970.webp" alt="México 1970 final poster, illustrated." loading="lazy" /></a>
        <a href="https://thearchv.ca/#archive"><img src="/posters/azteca-1986.webp" alt="Azteca 1986 final poster, illustrated." loading="lazy" /></a>
        <a href="https://thearchv.ca/#archive"><img src="/posters/paris-1998.webp" alt="Paris 1998 final poster, illustrated." loading="lazy" /></a>
      </div>
    </div>
  </main>
  <script>
    (function () {
      function track(target, href) { if (window.posthog) posthog.capture('start_cta_click', { target: target, href: href }); }
      function bind(el, target) { if (el) el.addEventListener('click', function () { track(target, el.href); }); }
      bind(document.getElementById('app-store-badge'), 'appstore');
      bind(document.getElementById('today-card'), 'today_card');
      bind(document.getElementById('today-cta'), 'today_cta');
      document.querySelectorAll('.linkrow .quiet').forEach(function (a) {
        bind(a, a.href.indexOf('substack') > -1 ? 'dispatch' : a.href.indexOf('etsy') > -1 ? 'store' : 'archive');
      });
      fetch('/feed/today.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).then(function (d) {
        var lead = d && d.lead;
        if (!lead || !lead.url) return;
        var card = document.getElementById('today-card');
        var cta = document.getElementById('today-cta');
        var img = document.getElementById('today-img');
        card.href = lead.url;
        cta.href = lead.url;
        if (img && lead.infogram) {
          var probe = new Image();
          probe.onload = function () {
            img.src = lead.infogram;
            img.alt = lead.infogramAlt || lead.headline || img.alt;
          };
          probe.src = lead.infogram;
        }
      }).catch(function () {});
    })();
  </script>
